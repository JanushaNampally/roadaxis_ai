{% extends 'base.html' %}

{% block content %}

<section class="chatbot-section">

    <h1>AI Machinery Assistant</h1>

    <form method="POST" class="chat-form">

        {% csrf_token %}

        <input type="text" name="message"
               placeholder="Ask about machines, prices, availability..."
               required>

        <button type="submit">Ask AI</button>

    </form>

    {% if response %}

        <div class="chat-response">
            {{ response|safe }}
        </div>

    {% endif %}

</section>

{% endblock %}
