{% extends 'base.html' %}

{% block content %}

<section class="booking-section">

    <h2>Book: {{ machine.name }}</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST" class="booking-form">
        {% csrf_token %}

        <label>Name</label>
        {{ form.customer_name }}

        <label>Phone</label>
        {{ form.phone }}

        <label>Email</label>
        {{ form.email }}

        <label>Start Date</label>
        {{ form.start_date }}

        <label>End Date</label>
        {{ form.end_date }}

        <label>Location</label>
        {{ form.location }}

        <label>Message</label>
        {{ form.message }}

        <button type="submit" class="btn">Submit Booking</button>
    </form>

</section>

{% endblock %}
